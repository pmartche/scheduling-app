name: CI

on:
  push:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx nx format:check  --base="remotes/origin/main"
      - run: npx nx run-many -t lint test build typecheck --all
      - run: npx playwright install --with-deps
      - run: npx nx e2e api-gateway-e2e
      - run: npx nx e2e web-e2e
